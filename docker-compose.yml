services:
  postgres:
    image: postgres:17-alpine
    container_name: saversure-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: saversure
      POSTGRES_USER: saversure_app
      POSTGRES_PASSWORD: julaherb789
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saversure_app -d saversure"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: saversure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2-alpine
    container_name: saversure-nats
    ports:
      - "4222:4222"
      - "18222:8222"
    command: -js -sd /data -m 8222
    volumes:
      - nats-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: saversure-minio
    ports:
      - "59300:9000"
      - "59301:9001"
    environment:
      MINIO_ROOT_USER: saversure-admin
      MINIO_ROOT_PASSWORD: julaherb789minio
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saversure-api
    ports:
      - "30400:30400"
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: "30400"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: saversure
      DB_USER: saversure_app
      DB_PASSWORD: julaherb789
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NATS_URL: nats://nats:4222
      JWT_SECRET: saversure-dev-jwt-secret-change-in-prod-2026
      HMAC_SECRET: saversure-dev-hmac-2026
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "saversure-admin"
      MINIO_SECRET_KEY: "julaherb789minio"
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://localhost:59300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  nats-data:
  minio-data:
