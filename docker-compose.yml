services:
  postgres:
    image: postgres:17-alpine
    container_name: saversure-postgres
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: saversure
      POSTGRES_USER: saversure_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saversure_app -d saversure"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: saversure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2-alpine
    container_name: saversure-nats
    ports:
      - "4222:4222"
      - "18222:8222"
    command: -js -sd /data -m 8222
    volumes:
      - nats-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saversure-api
    ports:
      - "30400:30400"
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: "30400"
      DB_HOST: host.docker.internal
      DB_PORT: "15433"
      DB_NAME: saversure
      DB_USER: saversure_app
      DB_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret}
      HMAC_SECRET: ${HMAC_SECRET:-change_me_hmac_secret}
      # Remote MinIO Server
      MINIO_ENDPOINT: "192.168.0.60:59300"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-change_me_minio_access_key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change_me_minio_secret_key}
      MINIO_BUCKET: "saversure-dev"
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://192.168.0.60:59300"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  nats-data:
